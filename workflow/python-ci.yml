name: python-ci on: workflow_call: jobs: test: runs-on: ubuntu-latest strategy: fail-fast: false matrix: python-version: ['3.10', '3.11', '3.12'] steps: - uses: actions/checkout@v4 - uses: actions/setup-python@v5 with: python-version: ${{ matrix.python-version }} cache: pip cache-dependency-path: | **/pyproject.toml **/requirements*.txt **/setup.cfg - name: Install run: | python -m pip install -U pip python -m pip install ruff mypy black pytest pytest-cov python -m pip install -e . - name: Lint (ruff) run: ruff check . - name: Format (black) run: black --check . - name: Type-check (mypy) run: mypy . - name: Tests run: pytest -q --maxfail=1 --disable-warnings --cov --cov-report=xml - name: Upload coverage if: always() uses: actions/upload-artifact@v4 with: name: coverage-${{ matrix.python-version }} path: coverage.xml if-no-files-found: ignore